version: '3.8'

services:
  tts-api:
    build: .
    container_name: tts-api-service
    ports:
      - "5000:5000"
    volumes:
      - ./temp_f5:/app/temp_f5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
